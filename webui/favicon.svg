  <circle cx="9.5" cy="10.5" r="1.3" fill="#1a1a2e"/>
  <circle cx="14.5" cy="10.5" r="1.3" fill="#1a1a2e"/>
  <!-- Ears -->
  <rect x="3" y="8" width="2" height="5" rx="0.5" fill="#4fc3f7"/>
  <rect x="19" y="8" width="2" height="5" rx="0.5" fill="#4fc3f7"/>
  <!-- Mouth -->
  <line x1="9" y1="13.5" x2="15" y2="13.5" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
