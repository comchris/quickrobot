  <line x1="12" y1="6" x2="12" y2="3" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="2.5" r="1" fill="#4fc3f7"/>
  <!-- Head -->
