<script>
(function() {
  var QR_SETTINGS_KEY = 'qr_webui_settings';

  window.qrSettings = {
    _data: null,
    _key: QR_SETTINGS_KEY,
    _lastSet: null,

    load: function() {
      try {
        var raw = localStorage.getItem(this._key);
        this._data = raw ? JSON.parse(raw) : {};
      } catch(e) {
        this._data = {};
      }
      return this;
    },

    get: function(page, key, defaultVal) {
      this.load();
      var val = (this._data[page] || {})[key];
      return (val !== undefined) ? val : defaultVal;
    },

    set: function(page, key, value) {
      this.load();
      if (!this._data[page]) this._data[page] = {};
      this._data[page][key] = value;
      this._lastSet = { page: page, key: key, value: value };
      this.save();
    },

    save: function() {
      localStorage.setItem(this._key, JSON.stringify(this._data));
      if (this._lastSet) {
        window.dispatchEvent(new CustomEvent('qrSettingsChange', { detail: this._lastSet }));
      }
    },

    getAll: function(page) {
      this.load();
      return this._data[page] || {};
    }
  };

  // Cross-tab sync via storage event
  window.addEventListener('storage', function(e) {
    if (e.key === QR_SETTINGS_KEY) {
      qrSettings.load();
    }
  });

  // Listen for same-tab setting changes from other methods
  window.addEventListener('qrSettingsChange', function(e) {
    qrSettings.load();
  });

  // Auto-load on init
  qrSettings.load();
})();

// Centralized API base path and utility functions
window.QR_API_BASE = "/api/v1";

// Timestamp formatting utilities — UTC-aware, consistent across all pages
(function() {
    /** Format ISO timestamp to relative time string (no "ago" suffix). */
    window.qrFmtRelative = function(iso) {
        if (!iso || iso === '-') return '-';
        try {
            var ts = new Date(iso.replace('Z', '+00:00').replace(' ', 'T'));
            if (isNaN(ts.getTime())) return iso;
            var diff = Math.floor((new Date() - ts) / 1000);
            if (diff < 0) return iso;
            var d = Math.floor(diff / 86400);
            diff %= 86400;
            var h = Math.floor(diff / 3600);
            diff %= 3600;
            var m = Math.floor(diff / 60);
            var s = diff % 60;
            if (d >= 7) return d + 'd';
            if (d > 0) return d + 'd ' + h + 'h';
            if (h > 0) return h + 'h ' + m + 'm';
            if (m > 0) return m + 'm ' + s + 's';
            return s + 's';
        } catch(e) { return iso; }
    };

    /** Format ISO timestamp to localized display string — UTC-aware, uses window._qr_tz_name. */
    window.qrFmtTimestamp = function(iso) {
        if (!iso || iso === '-') return '-';
        try {
            var ts = new Date(iso.replace('Z', '+00:00').replace(' ', 'T'));
            if (isNaN(ts.getTime())) return iso;
            var now = new Date();
            var diffHrs = Math.floor((now - ts) / 3600000);
            var tzName = typeof window._qr_tz_name !== 'undefined' ? window._qr_tz_name : null;
            // <24h: relative-only (e.g. "2h 30m"), >=24h: full datetime + relative (e.g. "Jun 7, 14:30 (2d)")
            if (diffHrs < 24) {
                return qrFmtRelative(iso);
            }
            var dateStr = ts.toLocaleString(undefined, {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false,
                timeZone: tzName || undefined
            });
            return dateStr + ' (' + qrFmtRelative(iso) + ')';
        } catch(e) { return iso; }
    };

    /** Lightweight table loader scaffolding for future dynamic table pages. */
    window.qrLoadTable = function(containerId, fetchUrl) {
        var container = document.getElementById(containerId);
        if (!container) return Promise.reject('Container not found: ' + containerId);
        container.innerHTML = '<p>Loading...</p>';
        return qrApi(fetchUrl).then(function(data) {
            return data; // caller handles rendering
        }).catch(function(e) {
            container.innerHTML = '<p class="error">Load failed: ' + (e && e.message || e) + '</p>';
            throw e;
        });
    };

    /** Format ISO timestamp to compact date string. */
    window.qrFmtCompact = function(iso) {
        if (!iso) return "N/A";
        try {
            var d = new Date(iso.replace('Z', '+00:00').replace(' ', 'T'));
            return d.toLocaleDateString(undefined, { month: '2-digit', day: '2-digit', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        } catch(e) { return iso; }
    };

    /** Format ISO timestamp to UTC-relative (for log viewer). */
    window.qrFmtLogTime = function(iso) {
        if (!iso) return "N/A";
        try {
            var d = new Date(iso.replace('Z', '+00:00').replace(' ', 'T'));
            return d.toLocaleTimeString(undefined, { hour12: false });
        } catch(e) { return iso; }
    };

    /** Make a fetch call to the API with auth token. */
    window.qrApi = function(path, opts) {
        opts = opts || {};
        var headers = opts.headers || {};
        // Inject bearer token if available
        if (window._qr_bearer_token) {
            headers["Authorization"] = "Bearer " + window._qr_bearer_token;
        }
        return fetch(QR_API_BASE + path, Object.assign({}, opts, { headers: headers }))
            .then(function(r) {
                var ct = r.headers.get('content-type') || '';
                if (ct.indexOf('application/json') !== -1) return r.json().catch(function(e) { return {}; });
                return r.text().then(function(t) { throw new Error(t); });
            })
            .catch(function(e) { return Promise.reject(new Error(e && e.message || 'Request failed')); });
    };
})();

    .ctrl-reset { cursor: pointer; color: var(--accent, #4fc3f7); font-size: 60%; user-select: none; padding: 2px 8px; }
    .ctrl-reset:hover { opacity: 0.7; text-decoration: underline; }

   /* Global status indicator dot — immune to color engine transforms */
    :root { --status-dot-color: #ffffff; }
    .qr-status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--status-dot-color);
      margin-right: 6px; vertical-align: middle; opacity: 0.85;
      transition: background 0.3s ease;
    }
    .qr-status-dot:hover { opacity: 1; }
</style>
</head>

<script>
(function() {
  // Event delegation: handle clicks on nav-section-header via parent <ul>
  var navUl = document.querySelector('nav > ul');
  if (navUl) {
    navUl.addEventListener('click', function(e) {
      var header = e.target.closest('.nav-section-header');
      if (!header) return;
      var section = header.parentElement;
      var items = section.querySelector('.nav-section-items');
      var chevron = header.querySelector('.nav-chevron');
      var isCollapsed = section.getAttribute('data-collapsed') === 'true';
      section.setAttribute('data-collapsed', isCollapsed ? 'false' : 'true');
      if (isCollapsed) {
        items.style.display = 'block';
        chevron.innerHTML = '&#9660;';
      } else {
        items.style.display = 'none';
        chevron.innerHTML = '&#9654;';
      }
      var key = 'nav_' + section.getAttribute('data-section');
      try {
        var newState = section.getAttribute('data-collapsed');
        sessionStorage.setItem(key, newState);
        console.log('saved:', key, '->', newState);
      } catch(ex) { console.log('save error:', ex); }
    });
  }

 // Restore collapsed state on load — engines_nav sections
   {% for section in engines_nav %}
   (function() {
     var key = 'nav_{{ section.header | lower | replace(" ", "-") }}';
     try {
       var saved = sessionStorage.getItem(key);
       if (saved === 'true') {
         var sectionKey = key.substring(4); // strip "nav_" prefix to match data-section
         var sectionEl = document.querySelector('.nav-section[data-section="' + sectionKey + '"]');
         if (sectionEl) {
           sectionEl.setAttribute('data-collapsed', 'true');
           var items = sectionEl.querySelector('.nav-section-items');
           if (items) items.style.display = 'none';
           var chevron = sectionEl.querySelector('.nav-chevron');
           if (chevron) chevron.innerHTML = '&#9654;';
         }
       }
     } catch(ex) { console.log('restore error:', ex); }
   })();
   {% endfor %}
   // Restore collapsed state for Skins section (added in base.html, not in engines_nav)
    (function() {
      try {
        var saved = sessionStorage.getItem('nav_skins');
        if (saved === 'true') {
         var sectionEl = document.querySelector('.nav-section[data-section="skins"]');

           sectionEl.setAttribute('data-collapsed', 'true');

           if (items) items.style.display = 'none';

           if (chevron) chevron.innerHTML = '&#9654;';

       }
     } catch(ex) { console.log('restore error:', ex); }
   })();
 })();

 <script>
(function(){
  // Unified color engine lazy-load + settings management (base.html only)
  // Once color_engine.js loads, it takes over all slider/disco/reset logic.
  var _defaultP = 100, _defaultM = 50;
  var _savedP = _defaultP, _savedM = _defaultM;

  try {
    var raw = localStorage.getItem('qr_color_engine');
    if (raw) { var p = JSON.parse(raw); if (typeof p.power === 'number') _savedP = p.power; if (typeof p.mood === 'number') _savedM = p.mood; }
  } catch(e) {}

  // Load engine: idempotent, sets _qr_color_engine_loaded flag
  function loadEngine() {
    if (window._qr_color_engine_loaded) return;
    window._qr_color_engine_loaded = true;
    var el = document.createElement('script');
    el.src = '/_static/color_engine.js';
    document.head.appendChild(el);
  }

  // Pre-set slider values from saved settings so UI shows current state immediately
  var powerSlider = document.getElementById('ctrl-power');
  var moodSlider = document.getElementById('ctrl-mood');
  if (powerSlider) powerSlider.value = _savedP;
  if (moodSlider) moodSlider.value = _savedM;

  // Wire lazy-load triggers: slider change, disco toggle
  if (powerSlider) powerSlider.addEventListener('input', function() { loadEngine(); });
  if (moodSlider) moodSlider.addEventListener('input', function() { loadEngine(); });

  // Disco toggle: delegate to ColorEngine if loaded, otherwise manage localStorage directly
  var discoPi = document.getElementById('disco-pi');
  if (discoPi) {
    discoPi.addEventListener('click', function() {
      // If engine already loaded, delegate to its disco methods (single handler)
      if (window._qr_color_engine_loaded && window.ColorEngine) {
        var isDisco = ColorEngine.discoGetState();
        if (isDisco) {
          ColorEngine.discoStop();
        } else {
          var moodSlider = document.getElementById('ctrl-mood');
          var m = parseInt(moodSlider ? moodSlider.value : 50, 10);
          ColorEngine.discoStart(m);
        }
      } else {
        // Engine not yet loaded — toggle localStorage directly
        loadEngine();
        try {
          var isActive = localStorage.getItem('qr_disco_active') === 'true';
          if (isActive) {
            localStorage.removeItem('qr_disco_active');
            localStorage.removeItem('qr_disco_startTime');
            localStorage.removeItem('qr_disco_duration');
          } else {
            localStorage.setItem('qr_disco_active', 'true');
            localStorage.setItem('qr_disco_startTime', String(performance.now()));
            localStorage.setItem('qr_disco_duration', '4000');
          }
        } catch(e) {}
      }
    });
  }

  // Reset to defaults: write to localStorage, reset sliders, reload to apply CSS
  var resetBtn = document.getElementById('btn-reset-colors');
  if (resetBtn) {
    resetBtn.addEventListener('click', function() {
      // Write defaults to settings (inline script reads this on load)
      try { localStorage.setItem('qr_color_engine', JSON.stringify({power: _defaultP, mood: _defaultM})); } catch(e) {}
      // Reset slider DOM values
      if (powerSlider) powerSlider.value = _defaultP;
      if (moodSlider) moodSlider.value = _defaultM;
      // Clear disco state
      try { localStorage.removeItem('qr_disco_active'); localStorage.removeItem('qr_disco_startTime'); localStorage.removeItem('qr_disco_duration'); } catch(e) {}
      // Reload to re-apply default colors from inline palette script
      window.location.reload();
    });
  }

  // If saved values are non-default OR disco mode is active, load engine immediately
  try {
    var _discoActive = localStorage.getItem('qr_disco_active') === 'true';
  } catch(e) { var _discoActive = false; }
  if (_savedP !== _defaultP || _savedM !== _defaultM || _discoActive) {
    loadEngine();
  }
})();

// Resizable nav sidebar — persisted in qrSettings, min 50px
(function() {
  var handle = document.getElementById('nav-resize-handle');
  if (!handle) return;
  var WRAPPER_PAGE = 'layout';
  var WIDTH_KEY = 'nav_width_px';
  var MIN_W = 50, MAX_W = 500, DEFAULT_W = 200;

  // Apply saved width on load
  var savedW = qrSettings.get(WRAPPER_PAGE, WIDTH_KEY, DEFAULT_W);
  if (typeof savedW !== 'number') savedW = DEFAULT_W;
  savedW = Math.max(MIN_W, Math.min(MAX_W, savedW));
  document.documentElement.style.setProperty('--nav-width', savedW + 'px');

  // Drag-to-resize
  var dragging = false;
  var startX = 0;
  var startW = 0;

  handle.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    dragging = true;
    startX = e.clientX;
    startW = savedW;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var delta = e.clientX - startX;
    var newW = Math.max(MIN_W, Math.min(MAX_W, startW + delta));
    document.documentElement.style.setProperty('--nav-width', newW + 'px');
  });

  document.addEventListener('mouseup', function(e) {
    if (!dragging) return;
    dragging = false;
    var finalW = parseInt(document.documentElement.style.getPropertyValue('--nav-width'), 10);
    if (isNaN(finalW)) finalW = DEFAULT_W;
    finalW = Math.max(MIN_W, Math.min(MAX_W, finalW));
    qrSettings.set(WRAPPER_PAGE, WIDTH_KEY, finalW);
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // Cross-tab sync
  window.addEventListener('qrSettingsChange', function(e) {
    if (e.detail.page === WRAPPER_PAGE && e.detail.key === WIDTH_KEY) {
      var w = Math.max(MIN_W, Math.min(MAX_W, e.detail.value));
      document.documentElement.style.setProperty('--nav-width', w + 'px');
    }
  });
})();
</script>
