# @name: Get Instance Logs
# @playbook_id: NODE_GET_INSTANCE_LOGS_V1
# @version: 1
# @timeout: 30
# get_instance_logs.yml — Fetch systemd journal logs for a quickrobot instance
# Uses extra_vars: target_host, log_instance, log_lines
- hosts: "{{ target_host }}"
  gather_facts: no
  become: yes
  tasks:
    - name: Get journal logs
      ansible.builtin.command: "journalctl -u qr-{{ log_instance }} --utc --no-pager -n {{ log_lines }}"
      register: _journal_output
      changed_when: false
      failed_when: false

    - name: Output logs
      ansible.builtin.debug:
        msg: "{{ _journal_output.stdout }}"
