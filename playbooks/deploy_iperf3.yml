# @name: Deploy Iperf3
# @playbook_id: DEPLOY_IPERF3_V1
# @version: 1
# @timeout: 600
# deploy_iperf3.yml — Deploy iperf3 instance to target node
- hosts: "{{ inventory_host }}"
  become: yes
  vars:
    instance_id: "{{ instance_id }}"
    instance_name: "{{ instance_name }}"
    engine_type: "{{ engine_type }}"
    instance_port: "{{ instance_port }}"
    binary_path: "{{ binary_path | default('/usr/bin/iperf3') }}"
    device: "{{ device | default('CPU') }}"
    start_on_boot: "{{ start_on_boot | default(false) }}"
    start_after_deploy: "{{ start_after_deploy | default(false) }}"
    log_dir: "/var/log/quickrobot"
    unit_name: "qr-{{ instance_id }}-{{ engine_type }}"
    env_file: "/etc/quickrobot/{{ unit_name }}.env"
    cli_args: "{{ merged_cli_opts | default([]) | join(' ') }}"
    remote_node_user: "{{ remote_node_user }}"
    target_host: "{{ target_host | default('') }}"
    target_port: "{{ target_port | default('') }}"

  tasks:
    - name: Preflight check — verify host is reachable and controllable
      ansible.builtin.ping:

    - name: Preflight check — scan existing QR service UUIDs on remote node
      shell: "grep -h 'QR_UUID' /etc/systemd/system/qr-*.service 2>/dev/null || true"
      register: preflight_uuids
      changed_when: false

    - name: Preflight check — log any UUID mismatches
      debug:
        msg: "UUID mismatch on {{ inventory_hostname }}: {{ preflight_uuids.stdout }}"
      when: preflight_uuids.stdout | trim | length > 0

    - name: Preflight check — log node build state
      debug:
        msg: "Node {{ inventory_hostname }} build state: {{ node_build_state | default('idle') }}"
      changed_when: false

    # Install iperf3 if not already present (idempotent)
    - name: Ensure iperf3 is installed
      ansible.builtin.apt:
        name: iperf3
        state: present
        update_cache: yes
      register: iperf3_install

    - name: Create /etc/quickrobot directory
      file:
        path: "/etc/quickrobot"
        state: directory
        mode: '0755'

    - name: Create instance directory
      file:
        path: "/opt/quickrobot/{{ unit_name }}"
        state: directory
        mode: '0755'

    # iperf3 does not use environment variables — skip env file

    # Generate systemd service unit from template
    - name: Generate systemd service unit from template
      template:
        src: iperf3_service.j2
        dest: "/etc/systemd/system/{{ unit_name }}.service"

    - name: Reload systemd daemon
      systemd:
        name: "{{ unit_name }}"
        daemon_reload: yes

    - name: Log systemd config (boot + restart)
      debug:
        msg: "[qr] {{ inventory_hostname }}: {{ unit_name }} enabled={{ start_on_boot | default(false) }}, restart={{ restart_policy | default('no') }}"

    - name: Set iperf3 service boot state (start_on_boot)
      systemd:
        name: "{{ unit_name }}"
        enabled: "{{ start_on_boot | default(false) | bool }}"

    - name: Start iperf3 service after deploy (start_after_deploy)
      systemd:
        name: "{{ unit_name }}"
        state: started
      when: start_after_deploy | default(false)

    - name: Wait for port availability on remote node
      ansible.builtin.wait_for:
        port: "{{ instance_port }}"
        timeout: 15
        delay: 1
      delegate_to: "{{ inventory_host }}"
      when: start_after_deploy | default(false)
