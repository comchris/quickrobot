# @name: Check Undeploy
# @playbook_id: check_undeploy
# @version: 2
# check_undeploy.yml — Verify undeploy artifacts removed
- hosts: "{{ inventory_host }}"
  become: yes
  vars:
    unit_name: "qr-{{ instance_id }}-{{ engine_type | default('rpc') }}"
  tasks:
    - name: Check service file removed
      stat:
        path: "/etc/systemd/system/{{ unit_name }}.service"
      register: svc_check
    - name: Check env file removed
      stat:
        path: "/etc/quickrobot/{{ unit_name }}.env"
      register: env_check
    - name: Check instance dir removed
      stat:
        path: "/opt/quickrobot/{{ unit_name }}"
      register: dir_check
    - name: Report check results
      debug:
        msg: >-
          Undeploy check {{ unit_name }}: svc={{ 'gone' if not svc_check.stat.exists else 'EXISTS' }},
          env={{ 'gone' if not env_check.stat.exists else 'EXISTS' }},
          dir={{ 'gone' if not dir_check.stat.exists else 'EXISTS' }}
