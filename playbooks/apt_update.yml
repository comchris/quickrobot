# @name: Apt Update
# @playbook_id: APT_UPDATE_V1
# @version: 1
# @timeout: 300
# apt_update.yml — Run apt update on a remote node
- hosts: "{{ inventory_host }}"
  become: yes
  gather_facts: no
  tasks:
    - name: Run apt update
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
