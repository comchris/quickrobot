# @name: Undeploy Base
# @playbook_id: common_undeploy
# @version: 2
# common/undeploy_base.yml — Shared undeploy tasks used by all engine playbooks
# Variables required: unit_name (from playbook), instance_id, engine_type

- name: Stop {{ unit_name }} service
  systemd:
    name: "{{ unit_name }}"
    state: stopped
    enabled: no

- name: Wait for model unload (~5s to free GPU VRAM)
  shell: sleep 5
  changed_when: false

- name: Find remaining process PID by pkill pattern
  shell: "pgrep -f '{{ pkill_pattern }}' 2>/dev/null || true"
  register: _pids
  changed_when: false
  failed_when: false

- name: Force kill remaining processes if still running
  command: "kill -TERM {{ item }}"
  loop: "{{ (_pids.stdout | default('') | trim).split() | map('int') | list }}"
  when: (_pids.stdout | default('') | trim) | length > 0
  register: kill_result
  changed_when: true
  failed_when: false

- name: Remove service file
  file:
    path: "/etc/systemd/system/{{ unit_name }}.service"
    state: absent

- name: Remove symlink from multi-user.target.wants (cleanup stale enable)
  file:
    path: "/etc/systemd/system/multi-user.target.wants/{{ unit_name }}.service"
    state: absent

- name: Remove env file
  file:
    path: "/etc/quickrobot/{{ unit_name }}.env"
    state: absent

- name: Remove instance directory
  file:
    path: "/opt/quickrobot/{{ unit_name }}"
    state: absent

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Reset failed unit state
  command: "systemctl reset-failed {{ unit_name }}"
  failed_when: false

- name: Verify service file removed
  stat:
    path: "/etc/systemd/system/{{ unit_name }}.service"
  register: verify_svc
  changed_when: false

- name: Verify env file removed
  stat:
    path: "/etc/quickrobot/{{ unit_name }}.env"
  register: verify_env
  changed_when: false

- name: Report undeploy verification
  debug:
    msg: >-
      Undeploy {{ unit_name }}: svc={{ 'absent' if not verify_svc.stat.exists else 'PRESENT' }},
      env={{ 'absent' if not verify_env.stat.exists else 'PRESENT' }}
  when: verify_svc.stat.exists or verify_env.stat.exists
