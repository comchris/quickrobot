# @name: Reboot Node
# @playbook_id: REBOOT_NODE_V1
# @version: 1
# @timeout: 600
# reboot_node.yml — Reboot a remote node
# NOTE: become: yes required — sudoers.d not yet active on target nodes.
#       Once NOPASSWD sudo is confirmed, remove become and align with other playbooks.
- hosts: "{{ inventory_host }}"
  become: yes
  gather_facts: yes
  tasks:
    - name: Reboot node
      ansible.builtin.reboot:
        reboot_timeout: 300
        msg: "Reboot initiated by keeper_v2"
