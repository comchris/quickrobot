# @name: Undeploy Llama Rpc Undeploy Rpc
# @playbook_id: UNDEPLOY_LLAMA_RPC_V1
# @version: 1
# @timeout: 300
# undeploy_rpc.yml — Undeploy RPC engine instance from target node
- hosts: "{{ inventory_host }}"
  become: yes
  vars:
    instance_id: "{{ instance_id }}"
    engine_type: "rpc"
    unit_name: "qr-{{ instance_id }}-{{ engine_type }}"
    pkill_pattern: "{{ unit_name }}"
  tasks:
    - import_tasks: "{{ playbook_dir }}/common/undeploy_base.yml"
