# @name: Undeploy Llama Rpc
# @playbook_id: undeploy_rpc
# @version: 4
# undeploy_rpc.yml — Undeploy RPC engine instance from target node
# Extra vars: pkill_pattern (optional, defaults to ggml-rpc-server)
- hosts: "{{ inventory_host }}"
  become: yes
  vars:
    # engine_type comes from extra_vars passed by routes_instances.py
    # Default fallback to 'rpc' if not provided (legacy compat)
    unit_name: "qr-{{ instance_id }}-{{ engine_type | default('rpc') }}"
    _pkill_pattern: "{{ pkill_pattern | default('ggml-rpc-server') }}"
  tasks:
    - set_fact:
        pkill_pattern: "{{ _pkill_pattern }}"
      # Resolves the self-reference bug: pkill_pattern var used to reference itself
      # in template ({{ pkill_pattern | default(...) }}), causing Jinja2 recursion.
      # Now uses _pkill_pattern as intermediate, then set_fact for downstream tasks.
    - import_tasks: "{{ playbook_dir }}/common/undeploy_base.yml"
