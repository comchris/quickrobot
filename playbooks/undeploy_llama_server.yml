# @name: Undeploy Llama Server
# @playbook_id: undeploy_llama_server
# @version: 2
# undeploy_llama_server.yml — Undeploy llama.cpp server instance from target node
- hosts: "{{ inventory_host }}"
  become: yes
  vars:
    # engine_type comes from extra_vars passed by routes_instances.py
    unit_name: "qr-{{ instance_id }}-{{ engine_type | default('llama_server') }}"
    pkill_pattern: "llama-server"
  tasks:
    - import_tasks: "{{ playbook_dir }}/common/undeploy_base.yml"
