# @name: Update Llama Server
# @playbook_id: UPDATE_LLAMA_SERVER_V1
# @version: 1
# @timeout: 3600
# update_llama_server.yml — Git pull + cmake rebuild llama.cpp on target node
# Supports both llama_server and rpc engine types.
# Uses shared per-node source/build dirs.
- hosts: "{{ inventory_host }}"
  become: yes
  gather_facts: no
  vars:
    instance_id: "{{ instance_id }}"
    engine_type: "{{ engine_type | default('llama_server') }}"
    unit_name: "qr-{{ instance_id }}-{{ engine_type }}"
    node_src_dir: "{{ node_src_dir | default('/opt/quickrobot/llama.cpp') }}"
    node_build_dir: "{{ node_build_dir | default('/opt/quickrobot/llama.cpp/build') }}"
    remote_node_user: "{{ remote_node_user }}"

  tasks:
    - name: Verify shared source directory is a git repo
      stat:
        path: "{{ node_src_dir }}/.git"
      register: git_repo

    - name: Fail if not a git repository
      fail:
        msg: "{{ node_src_dir }} is not a git repository (no .git). Run deploy first."
      when: not git_repo.stat.exists

    - name: Stop llama.cpp service before rebuild
      systemd:
        name: "{{ unit_name }}"
        state: stopped
      ignore_errors: yes

    # Git pull + cmake build run as remote user (not root)
    - block:
        - name: Git pull ({{ node_git_pull_cmd | default('git pull origin master') }})
          shell: "{{ node_git_pull_cmd | default('git pull origin master') }}"
          args:
            chdir: "{{ node_src_dir }}"
          register: git_result
          changed_when: git_result.rc == 0
          failed_when: false

        - name: Get short commit hash
          shell: git rev-parse --short=7 HEAD
          args:
            chdir: "{{ node_src_dir }}"
          register: commit_hash
          changed_when: false

        - name: Ensure build directory exists
          file:
            path: "{{ node_build_dir }}"
            state: directory
            mode: '0755'

        - name: Reconfigure cmake (from node_build_set_cmd)
          shell: "{{ node_build_set_cmd | default('cmake -B {{ node_build_dir }} -DGGML_RPC=ON -DGGML_NATIVE=ON -DGGML_CPU=ON -DLLAMA_OPENSSL=ON -DGGML_AVX2=ON -DGGML_VULKAN=ON') }}"
          args:
            chdir: "{{ node_src_dir }}"
          register: cmake_configure
          changed_when: "'-- Configuring' in cmake_configure.stdout"

        - name: Build with cmake (from node_build_run_cmd)
          shell: "{{ node_build_run_cmd | default('cmake --build {{ node_build_dir }} --config Release -j 2') }}"
          args:
            chdir: "{{ node_src_dir }}"
          register: build_result
          changed_when: false

        - name: Verify new binary exists
          stat:
            path: "{{ node_build_dir }}/bin/{{ 'llama-server' if engine_type == 'llama_server' else 'rpc-server' }}"
          register: new_binary

        - name: Fail if binary not found after build
          fail:
            msg: "Build completed but {{ 'llama-server' if engine_type == 'llama_server' else 'rpc-server' }} not found in {{ node_build_dir }}/bin/"
          when: not new_binary.stat.exists
      become_user: "{{ remote_node_user }}"

    - name: Report build result
      debug:
        msg: >-
          Build complete: commit={{ commit_hash.stdout }},
          git_changed={{ git_result.rc | default(0) }}
