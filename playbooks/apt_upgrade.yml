# @name: Apt Upgrade
# @playbook_id: APT_UPGRADE_V1
# @version: 1
# @timeout: 900
# apt_upgrade.yml — Run apt upgrade on a remote node
- hosts: "{{ inventory_host }}"
  become: yes
  gather_facts: no
  tasks:
    - name: Run apt upgrade (non-interactive)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: yes
        force_apt_get: yes
